<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>日文活用 Flashcard 小遊戲</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root {
    --primary: #4f46e5;
    --bg: #f6f7fb;
}

body {
    margin: 0;
    background: var(--bg);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 1rem;
}

.card-box {
    background: white;
    border-radius: 16px;
    padding: 1.2rem;
    box-shadow: 0 8px 24px rgba(0,0,0,.08);
}

h1 {
    text-align: center;
    font-size: 1.5rem;
}

.base {
    font-size: 2.2rem;
    font-weight: 700;
    text-align: center;
    margin-top: 1rem;
}

.prompt {
    text-align: center;
    margin-top: .4rem;
    color: #555;
}

input[type="text"] {
    width: 100%;
    padding: .8rem;
    font-size: 1.1rem;
    margin-top: 1rem;
}

button {
    width: 100%;
    padding: .9rem;
    font-size: 1.05rem;
    margin-top: .6rem;
    border: none;
    border-radius: 12px;
}

.primary { background: var(--primary); color: white; }
.secondary { background: #e5e7eb; }

.feedback { margin-top: .8rem; font-size: .95rem; }
.correct { color: green; }
.wrong { color: red; }

.answer-box {
    margin-top: .6rem;
    background: #f9fafb;
    border-radius: 12px;
    padding: .8rem;
    font-size: .9rem;
}

.base-answer {
    font-weight: 700;
    margin-bottom: .4rem;
}

.highlight {
    font-weight: 700;
    color: var(--primary);
}

.progress {
    text-align: center;
    margin-top: .6rem;
    font-size: .85rem;
    color: #666;
}

.loading {
    text-align: center;
    padding: 2rem;
}
</style>
</head>

<body>
<div class="container">

<h1>🎴 日文活用 Flashcard</h1>

<div class="card-box loading" id="loading">
📂 載入 Flash card content.xlsx 中…
</div>

<div class="card-box" id="game" style="display:none;">
    <div class="base" id="base"></div>
    <div class="prompt" id="prompt"></div>

    <input type="text" id="answer" placeholder="輸入答案">

    <button class="primary" onclick="submitAnswer()">送出</button>
    <button class="secondary" onclick="skipQuestion()">跳過並顯示答案</button>
    <button class="secondary" id="nextBtn" onclick="goNext()" style="display:none;">
        下一題
    </button>

    <div class="feedback" id="feedback"></div>
    <div class="progress" id="progress"></div>
</div>

</div>

<script>
let words = [];
let current, key;
let count = 0, correct = 0;
let skipped = false;

async function autoLoadExcel() {
    try {
        const response = await fetch("Flash card content.xlsx");
        const data = await response.arrayBuffer();
        const wb = XLSX.read(data, { type: "array" });

        wb.SheetNames.forEach(sheet => {
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheet]);

            rows.forEach(r => {
                if (!r["基本体"]) return;

                const forms = {};
                Object.keys(r).forEach(col => {
                    if (col !== "基本体" && r[col] && r[col] !== "—") {
                        forms[col] = r[col];
                    }
                });

                if (Object.keys(forms).length) {
                    words.push({
                        base: r["基本体"],
                        forms
                    });
                }
            });
        });

        document.getElementById("loading").style.display = "none";
        document.getElementById("game").style.display = "block";
        next();

    } catch (err) {
        document.getElementById("loading").innerHTML =
            "❌ 無法載入 Excel<br>請確認使用 GitHub Pages 或 http:// 環境";
    }
}

function renderAnswerBox(highlightKey) {
    let html = `<div class="answer-box">
        <div class="base-answer">基本体：${current.base}</div>`;

    Object.keys(current.forms).forEach(k => {
        html += `<div class="${k === highlightKey ? 'highlight' : ''}">
            ${k}：${current.forms[k]}
        </div>`;
    });

    html += `</div>`;
    return html;
}

function next() {
    if (count >= 20) {
        document.getElementById("game").innerHTML =
            `<h2>✅ 完成</h2>
             <p>正確 ${correct} / 20</p>
             <button class="primary" onclick="location.reload()">再玩一次</button>`;
        return;
    }

    skipped = false;
    document.getElementById("nextBtn").style.display = "none";

    current = words[Math.floor(Math.random() * words.length)];
    const keys = Object.keys(current.forms);
    key = keys[Math.floor(Math.random() * keys.length)];

    document.getElementById("base").textContent = current.base;
    document.getElementById("prompt").textContent = `請輸入：${key}`;
    document.getElementById("answer").value = "";
    document.getElementById("feedback").innerHTML = "";
    document.getElementById("progress").textContent = `第 ${count + 1} / 20 題`;
}

function submitAnswer() {
    const ans = document.getElementById("answer").value.trim();
    if (!ans) return;

    if (ans === current.forms[key]) {
        correct++;
        document.getElementById("feedback").innerHTML =
            `<span class="correct">✅ 正確</span>`;
        count++;
        setTimeout(next, 900);
    } else {
        document.getElementById("feedback").innerHTML =
            `<span class="wrong">❌ 錯誤</span>` +
            renderAnswerBox(key);
    }
}

function skipQuestion() {
    skipped = true;
    document.getElementById("feedback").innerHTML =
        `⏭️ 已跳過` + renderAnswerBox(key);
    document.getElementById("nextBtn").style.display = "block";
}

function goNext() {
    if (!skipped) return;
    count++;
    next();
}

autoLoadExcel();
</script>
</body>
</html>
